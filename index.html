<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bar Master TCG - Official</title>
    <style>
        :root {
            --primary: #6366f1;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #f59e0b;
            --text: #f8fafc;
            --danger: #ef4444;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--dark-bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .screen { display: none; width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; flex-direction: column; align-items: center; text-align: center; }
        .screen.active { display: flex; }

        /* Bottoni */
        .btn { background: var(--primary); color: white; border: none; padding: 15px 25px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 80%; margin: 10px 0; transition: 0.3s; text-transform: uppercase; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); }
        .btn-save-load { background: #334155; font-size: 0.7rem; padding: 8px; width: 45%; margin: 5px; }

        /* --- SBUSTO --- */
        .pack-container { perspective: 1000px; margin: 30px 0; }
        .pack-visual { width: 160px; height: 230px; background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%); border: 4px solid #fff; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 4rem; cursor: pointer; }
        .pack-visual.opening { animation: shake 0.5s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(5deg) scale(1.1); } 50% { transform: rotate(-5deg); } }
        #pack-results { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 20px; min-height: 150px; }
        .new-card-anim { background: var(--card-bg); border: 2px solid var(--accent); border-radius: 10px; padding: 10px; width: 90px; animation: popIn 0.5s forwards; }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* --- ALBUM --- */
        .category-title { width: 100%; text-align: left; margin: 20px 0 10px 0; border-left: 4px solid var(--accent); padding-left: 10px; color: var(--accent); font-size: 0.8rem; text-transform: uppercase; }
        .collection-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; }
        .card { background: var(--card-bg); border-radius: 8px; padding: 8px; border: 1px solid #334155; position: relative; height: 100px; display: flex; flex-direction: column; justify-content: center; cursor: pointer; }
        .card.locked { opacity: 0.2; filter: grayscale(1); cursor: default; }
        .card-count { position: absolute; top: -5px; right: -5px; background: var(--accent); color: #000; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; }
        .card-info-mini { font-size: 0.6rem; color: #94a3b8; margin-top: 5px; }

        /* --- DETTAGLIO --- */
        #card-detail-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; }
        .detail-view { background: var(--card-bg); width: 85%; max-width: 350px; border-radius: 20px; padding: 25px; border: 2px solid var(--accent); text-align: center; }
        .detail-emoji { font-size: 4rem; margin-bottom: 10px; }
        .detail-desc { font-style: italic; color: #94a3b8; margin: 15px 0; font-size: 0.85rem; line-height: 1.4; }
        .detail-effect { background: #0f172a; padding: 12px; border-radius: 10px; border: 1px dashed var(--accent); font-size: 0.8rem; text-align: left; }
        .stats-badge { display: inline-block; background: var(--primary); padding: 5px 10px; border-radius: 5px; font-size: 0.7rem; margin: 5px; }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active">
        <h1 style="color: var(--accent); margin-bottom: 5px;">BAR MASTER</h1>
        <p style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 25px;">TCG EDITION</p>
        
        <button class="btn" onclick="showScreen('screen-pack')">🎁 Sbusta Pacchetto</button>
        <button class="btn btn-outline" onclick="showScreen('screen-list')">📖 Album Collezionista</button>

        <div style="display: flex; justify-content: center; width: 100%; margin-top: 30px;">
            <button class="btn btn-save-load" onclick="exportCode()">💾 Copia Salvataggio</button>
            <button class="btn btn-save-load" onclick="importCode()">📂 Carica Salvataggio</button>
        </div>
    </div>

    <div id="screen-pack" class="screen">
        <button class="btn btn-outline" style="width: auto; margin-right: auto; padding: 10px;" onclick="showScreen('screen-home')">⬅ Indietro</button>
        <div class="pack-container">
            <div id="main-pack" class="pack-visual" onclick="handleOpenPack()">🚬</div>
        </div>
        <div id="pack-results"></div>
        <button id="btn-continue" class="btn" style="display: none;" onclick="resetPackScreen()">Metti nell'album</button>
    </div>

    <div id="screen-list" class="screen">
        <button class="btn btn-outline" style="width: auto; margin-right: auto; padding: 10px;" onclick="showScreen('screen-home')">⬅ Indietro</button>
        <h2 style="color: var(--accent);">Il tuo Album</h2>
        <div id="collection-content" style="width: 100%;"></div>
    </div>

    <div id="card-detail-overlay" onclick="closeDetail()">
        <div class="detail-view" onclick="event.stopPropagation()">
            <div id="det-emoji" class="detail-emoji"></div>
            <h2 id="det-name" style="margin:0; color:var(--accent);"></h2>
            <div id="det-badges"></div>
            <p id="det-desc" class="detail-desc"></p>
            <div class="detail-effect">
                <strong style="color: var(--accent);">EFFETTO/POTERE:</strong><br>
                <span id="det-effect"></span>
            </div>
            <button class="btn" style="margin-top:20px;" onclick="closeDetail()">CHIUDI</button>
        </div>
    </div>

    <script>
        const cardDatabase = [
            // --- TIPI DA BAR ---
            { id: 1, cat: "Tipo da bar", name: "Bill", emoji: "🧔", level: 1, defense: 10, desc: "Tifa inter e fuma le sigarette tutto il giorno, campione di scala 40.", effect: "Tira una nebbia di fumo che riduce la precisione avversaria." },
            { id: 2, cat: "Tipo da bar", name: "Paolone", emoji: "🦍", level: 2, defense: 20, desc: "Il bodyguard di Longiano, ti attacca pezza e governa il paese, futuro sindaco.", effect: "Comizio: Ti parla per ore finché non ti addormenti sulla sedia." },
            { id: 3, cat: "Tipo da bar", name: "Cugino di coppa", emoji: "🏆", level: 3, defense: 30, desc: "Il babbo natale che tutti i bambini non sognano.", effect: "Regalo Sgradito: Ti regala una coppa di plastica che ingombra la tua difesa." },
            { id: 4, cat: "Tipo da bar", name: "Pallo", emoji: "⚽", level: 4, defense: 40, desc: "L'idolo delle folle.", effect: "Ovation: La curva canta per lui, aumentando la sua resistenza." },
            { id: 5, cat: "Tipo da bar", name: "Vecchietto", emoji: "👴", level: 5, defense: 50, desc: "Anni di esperienza a briscola, secondo lui tu rovini il paese mentre ti insulta e incassa la pensione. Esperto.", effect: "Critica Cantiere: Ti guarda le mani e ti corregge la mossa facendoti sentire un incapace." },
            // --- BEVANDE ---
            { id: 6, cat: "Bevanda", name: "Birra Moretti", emoji: "🍺", desc: "Ubriaca il personaggio che diventa imprevedibile.", effect: "MONETA: Testa -> Difesa x3 | Croce -> Difesa /2." },
            { id: 7, cat: "Bevanda", name: "Coca Cola", emoji: "🥤", desc: "Diventi un personaggio anonimo che non attirerà l'attenzione.", effect: "ANONIMO: Non puoi essere attaccato al prossimo turno." },
            { id: 8, cat: "Bevanda", name: "Prosecchino", emoji: "🥂", desc: "Sei con una figa e mandi fuori di testa il vecchietto.", effect: "INVIDIA: Se l'avversario ha un Vecchietto, la sua difesa si dimezza." },
            { id: 9, cat: "Bevanda", name: "Suchino alla pera", emoji: "🧃", desc: "Il potere di Beppe è con te, andate in bagno su un piano caldo.", effect: "BOOST CALDO: La tua difesa raddoppia per questo turno." },
            { id: 10, cat: "Bevanda", name: "Cedrata", emoji: "🍋", desc: "Se prendi questa bevanda al bar c'è qualcosa in te che non va.", effect: "DISPREZZO: Nessun effetto pratico, solo vergogna davanti ai presenti." },
            // --- AZIONI ---
            { id: 11, cat: "Azione da bar", name: "Scatarrata", emoji: "💦", damage: 5, desc: "Dopo essersi scofanato la ciotola di ragù ed esserti sporcato la camicia, attacchi l'avversario.", effect: "DANNO FISICO: 5 danni da schizzo." },
            { id: 12, cat: "Azione da bar", name: "Bevuta", emoji: "🍻", damage: 10, desc: "Sorsata ignorante che ti dà la carica per il prossimo insulto.", effect: "DANNO: 10." },
            { id: 13, cat: "Azione da bar", name: "Cala la briscola", emoji: "🃏", damage: 15, desc: "Mossa violenta che fa sobbalzare i bicchieri sul tavolino.", effect: "DANNO: 15." },
            { id: 14, cat: "Azione da bar", name: "Bestemmia", emoji: "🤬", damage: 25, desc: "Un urlo che gela il sangue a tutto il circolo ARCI.", effect: "DANNO SONORO: 25." },
            { id: 15, cat: "Azione da bar", name: "Insultare i giovani", emoji: "🖕", damage: 20, desc: "Ai miei tempi non c'erano i telefoni, solo fango e lavoro!", effect: "DANNO MORALE: 20." }
        ];

        let userData = { collection: JSON.parse(localStorage.getItem('userCardsBar')) || {} };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'screen-list') renderCollection();
        }

function handleOpenPack() {
    const pack = document.getElementById('main-pack');
    const results = document.getElementById('pack-results');
    if(pack.classList.contains('opening')) return;

    pack.classList.add('opening');

    setTimeout(() => {
        pack.style.display = 'none';
        for(let i=0; i<3; i++) {
            setTimeout(() => {
                const card = cardDatabase[Math.floor(Math.random() * cardDatabase.length)];
                
                // Salva i dati
                userData.collection[card.id] = (userData.collection[card.id] || 0) + 1;
                localStorage.setItem('userCardsBar', JSON.stringify(userData.collection));

                // Crea l'elemento visivo
                const el = document.createElement('div');
                el.className = 'new-card-anim';
                el.style.cursor = 'pointer'; // Fa capire che si può cliccare
                
                el.innerHTML = `
                    <div style="font-size:1.5rem">${card.emoji}</div>
                    <small style="font-size:0.6rem">${card.name}</small>
                `;

                // Permette di vedere il dettaglio subito!
                el.onclick = () => showDetail(card);

                results.appendChild(el);

                if(i === 2) document.getElementById('btn-continue').style.display = 'block';
            }, i * 400);
        }
    }, 600);
}

        function resetPackScreen() {
            document.getElementById('main-pack').style.display = 'flex';
            document.getElementById('main-pack').classList.remove('opening');
            document.getElementById('pack-results').innerHTML = '';
            document.getElementById('btn-continue').style.display = 'none';
            showScreen('screen-list');
        }

function renderCollection() {
    const container = document.getElementById('collection-content');
    container.innerHTML = '';
    
    // Definiamo le categorie nell'ordine esatto in cui vogliamo vederle
    const cats = ["Tipo da bar", "Bevanda", "Azione da bar"];
    
    cats.forEach(cat => {
        // Aggiungiamo il titolo della categoria
        const titleEl = document.createElement('div');
        titleEl.className = 'category-title';
        titleEl.innerText = cat;
        container.appendChild(titleEl);

        // Creiamo la griglia per le carte di questa categoria
        const grid = document.createElement('div');
        grid.className = 'collection-grid';
        
        // FILTRIAMO LE CARTE: Prendi tutte le carte che appartengono a questa categoria
        const cardsInCategory = cardDatabase.filter(c => c.cat === cat);
        
        cardsInCategory.forEach(card => {
            const count = userData.collection[card.id] || 0; // Quante ne ho?
            const isLocked = count === 0; // Se ne ho 0, è bloccata
            
            const cardEl = document.createElement('div');
            cardEl.className = `card ${isLocked ? 'locked' : ''}`;
            
            // Costruiamo il contenuto visivo della carta
            cardEl.innerHTML = `
                ${count > 1 ? `<div class="card-count">x${count}</div>` : ''}
                <div style="font-size:2rem">${card.emoji}</div>
                <div style="font-size:0.65rem; font-weight:bold;">${card.name}</div>
                <div class="card-info-mini">
                    ${card.level ? 'Liv. ' + card.level : ''}
                    ${card.damage ? 'Danno: ' + card.damage : ''}
                    ${card.cat === 'Bevanda' && !isLocked ? 'Power-up' : ''}
                </div>
            `;

            // ATTENZIONE: Abilitiamo il click solo se la carta è stata trovata (count > 0)
            if (!isLocked) {
                cardEl.onclick = () => {
                    console.log("Apertura dettaglio per:", card.name); // Debug per vedere se funziona
                    showDetail(card);
                };
            }
            
            grid.appendChild(cardEl);
        });
        
        container.appendChild(grid);
    });
}

// Assicurati che showDetail sia definita così per gestire tutti i campi:
function showDetail(card) {
    document.getElementById('det-emoji').innerText = card.emoji;
    document.getElementById('det-name').innerText = card.name;
    document.getElementById('det-desc').innerText = card.desc;
    document.getElementById('det-effect').innerText = card.effect;
    
    let badges = `<span class="stats-badge">${card.cat}</span>`;
    
    // Aggiungi badge dinamici in base al tipo di carta
    if(card.level) badges += `<span class="stats-badge">LIVELLO ${card.level}</span>`;
    if(card.defense) badges += `<span class="stats-badge" style="background:#10b981">DIFESA: ${card.defense}</span>`;
    if(card.damage) badges += `<span class="stats-badge" style="background:var(--danger)">DANNO: ${card.damage}</span>`;
    
    document.getElementById('det-badges').innerHTML = badges;
    document.getElementById('card-detail-overlay').style.display = 'flex';
}

        function showDetail(card) {
            document.getElementById('det-emoji').innerText = card.emoji;
            document.getElementById('det-name').innerText = card.name;
            document.getElementById('det-desc').innerText = card.desc;
            document.getElementById('det-effect').innerText = card.effect;
            
            let badges = `<span class="stats-badge">${card.cat}</span>`;
            if(card.level) badges += `<span class="stats-badge">LIVELLO ${card.level}</span>`;
            if(card.defense) badges += `<span class="stats-badge" style="background:#10b981">DIFESA: ${card.defense}</span>`;
            if(card.damage) badges += `<span class="stats-badge" style="background:var(--danger)">DANNO: ${card.damage}</span>`;
            
            document.getElementById('det-badges').innerHTML = badges;
            document.getElementById('card-detail-overlay').style.display = 'flex';
        }

        function closeDetail() { document.getElementById('card-detail-overlay').style.display = 'none'; }

        function exportCode() {
            const code = btoa(JSON.stringify(userData.collection));
            navigator.clipboard.writeText(code).then(() => alert("Codice copiato! Incollalo nelle note per non perderlo."));
        }

        function importCode() {
            const code = prompt("Incolla il codice salvato:");
            if (code) {
                try {
                    userData.collection = JSON.parse(atob(code));
                    localStorage.setItem('userCardsBar', JSON.stringify(userData.collection));
                    alert("Salvataggio caricato!");
                    if(document.getElementById('screen-list').classList.contains('active')) renderCollection();
                } catch(e) { alert("Codice non valido!"); }
            }
        }
    </script>
</body>
</html>
